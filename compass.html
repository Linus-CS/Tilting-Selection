<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compass Selection</title>

    <link rel="stylesheet" href="style.css">
    <script src="compass.js" defer></script>
</head>

<body>
    <div class="compass-container">
        <div class="nav-bar">
            <div class="toc">
                <h2>(</h2>
                <h2>)</h2>
            </div>
            <div class="category">
                <h2>(</h2>
                <h2>)</h2>
            </div>
            <div class="cursor"></div>
        </div>
        <div class="compass-wrapper">
            <div class="target-compass">
                <h2>(</h2>
                <h2>)</h2>
            </div>
            <div class="compass-oval">
                <div class="dot dot-north"></div>
                <div class="dot dot-east"></div>
                <div class="dot dot-south"></div>
                <div class="dot dot-west"></div>
            </div>

            <button id="enable-compass">
                Kompass aktivieren
            </button>
        </div>
    </div>
</body>

</html>
